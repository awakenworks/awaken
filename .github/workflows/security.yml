name: Security
on:
  push:
    branches: [main, master]
  pull_request:
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  rustsec-audit:
    name: RustSec Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit Rust dependencies
        run: |
          # Existing transitive advisories in the locked graph are ignored here;
          # new advisories still fail the job through --deny warnings.
          cargo audit --deny warnings \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0111 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0097

  admin-console-npm-audit:
    name: Admin Console npm Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        # pnpm audit doesn't accept --filter, so we cd into the workspace
        # via working-directory and let pnpm resolve from there.
        working-directory: apps/admin-console
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - name: pnpm install (root)
        working-directory: .
        run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high --prod

  www-npm-audit:
    name: WWW npm Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/www
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - name: pnpm install (root)
        working-directory: .
        run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high --prod
