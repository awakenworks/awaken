name: Test
on:
  push:
    branches: [main, master]
  pull_request:
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  book-doctests:
    name: Book Doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: bash scripts/test-book.sh

  ai-sdk-starter-build:
    # Build the frontend example to catch TypeScript errors
    name: AI SDK Starter Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/ai-sdk-starter
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/ai-sdk-starter/package-lock.json
      - run: npm ci
      - run: npm run build

  copilotkit-starter-build:
    name: CopilotKit Starter Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/copilotkit-starter
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/copilotkit-starter/package-lock.json
      - run: npm ci
      - run: npm run build

  admin-console-ci:
    name: Admin Console CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-console
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/admin-console/package-lock.json
      - run: npm ci
      - run: npm run ci

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - run: cargo check --workspace --locked

  postgres-store-tests:
    name: Postgres Store Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awaken_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awaken_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/awaken_test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p awaken-stores --features postgres --test postgres_store -- --ignored
