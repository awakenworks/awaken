name: Test
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  mcp-reference-e2e:
    name: MCP Reference E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: cargo test --locked -p awaken-ext-mcp --test e2e_server_everything -- --ignored --test-threads=1

  book-doctests:
    name: Doctest Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p awaken-doctest
      # examples/ are smoke tests with main fns — each `[[example]]` in
      # awaken-doctest/Cargo.toml sets `harness = false`, so `--examples`
      # builds each as its own binary and executes the example's `main()`
      # as the test entry point. Runtime panics (e.g. failed `assert_eq!`
      # in `effect_spec` round-trip) fail CI. Without `harness = false`
      # libtest would replace `main` and only type-check the body.
      # README + lib.rs reference this exact command — keep in sync.
      - run: cargo test --locked -p awaken-doctest --examples

  ai-sdk-starter-build:
    # Build the frontend example to catch TypeScript errors
    name: AI SDK Starter Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter awaken-ai-sdk-starter build

  copilotkit-starter-build:
    name: CopilotKit Starter Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter awaken-copilotkit-starter build

  admin-console-ci:
    name: Admin Console CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter awaken-admin-console run ci

  admin-console-e2e:
    name: Admin Console Browser E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter awaken-e2e exec playwright install --with-deps chromium
      - run: pnpm --filter awaken-e2e run test:admin

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      # CJK font for zh-cn landing snapshot stability — Ubuntu runners
      # ship no Chinese font by default, so without this the zh-cn pages
      # render with the wrong fallback and the committed baselines (taken
      # on a host with Noto Sans CJK) fail with ~4% pixel diff.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk && fc-cache -f
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter awaken-e2e exec playwright install --with-deps chromium
      - run: pnpm --filter awaken-e2e run test:visual
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diff
          path: e2e/test-results/
          retention-days: 7

  design-tokens-test:
    name: Design Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "@awaken/design-tokens" validate
      - run: pnpm --filter "@awaken/design-tokens" build
      - run: pnpm --filter "@awaken/design-tokens" test

  www-build:
    name: WWW Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "@awaken/www" build

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - run: cargo check --workspace --locked

  postgres-store-tests:
    name: Postgres Store Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awaken_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awaken_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/awaken_test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p awaken-stores --features postgres --test postgres_store -- --ignored

  postgres-event-outbox-replay-tests:
    name: Postgres Event/Outbox/Replay Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awaken_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awaken_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_TEST_URL: postgres://postgres:postgres@localhost:5432/awaken_test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/awaken_test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p awaken-stores --features postgres --test postgres_event_store -- --ignored
      - run: cargo test --locked -p awaken-stores --features postgres --test postgres_outbox_store -- --ignored
      - run: cargo test --locked -p awaken-stores --features postgres --test postgres_protocol_replay_log -- --ignored
      - run: cargo test --locked -p awaken-stores --features postgres --test postgres_commit_coordinator -- --ignored
      - run: cargo test --locked -p awaken-stores --features postgres --test postgres_stream_checkpoint -- --ignored

  nats-store-tests:
    name: NATS Store Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p awaken-stores --features nats --test nats_mailbox_connect -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_mailbox_conformance -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_mailbox_behavior -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_mailbox_distributed -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_mailbox_live -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_buffered_thread_connect -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_buffered_thread_conformance -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_buffered_thread_behavior -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_buffered_thread_distributed -- --test-threads=1
      - run: cargo test --locked -p awaken-stores --features nats --test nats_buffered_thread_adversarial -- --test-threads=1

  postgres-nats-server-tests:
    name: Postgres/NATS Server Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awaken_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awaken_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/awaken_test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p awaken-server --features nats --test config_backends -- --ignored --test-threads=1

  nats-stress-tests:
    name: NATS Stress Tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      AWAKEN_NATS_STRESS_RECORDS: 10000
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p awaken-stores --features nats --test nats_mailbox_stress -- --ignored --test-threads=1
