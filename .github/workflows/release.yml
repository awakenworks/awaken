name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - name: Verify version is not -dev
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if echo "$VERSION" | grep -q '\-dev'; then
            echo "ERROR: workspace version is $VERSION — remove the -dev suffix before tagging"
            exit 1
          fi
      - name: Run tests
        run: cargo test --workspace --locked
      - name: Publish awaken-contract
        run: cargo publish --no-verify -p awaken-contract
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-stores
        run: cargo publish --no-verify -p awaken-stores
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-tool-pattern
        run: cargo publish --no-verify -p awaken-tool-pattern
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-runtime
        run: cargo publish --no-verify -p awaken-runtime
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-ext-deferred-tools
        run: cargo publish --no-verify -p awaken-ext-deferred-tools
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-ext-generative-ui
        run: cargo publish --no-verify -p awaken-ext-generative-ui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-ext-mcp
        run: cargo publish --no-verify -p awaken-ext-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-ext-observability
        run: cargo publish --no-verify -p awaken-ext-observability
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-ext-permission
        run: cargo publish --no-verify -p awaken-ext-permission
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-ext-reminder
        run: cargo publish --no-verify -p awaken-ext-reminder
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-ext-skills
        run: cargo publish --no-verify -p awaken-ext-skills
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken-server
        run: cargo publish --no-verify -p awaken-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish awaken
        run: cargo publish --no-verify -p awaken
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
