[package]
name = "awaken-runtime"
version.workspace = true
readme = "../../README.md"
edition.workspace = true
description = "Phase-based execution engine, plugin system, and agent loop for Awaken"
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories = ["artificial-intelligence", "asynchronous"]

[dependencies]
awaken-contract = { workspace = true }
awaken-protocol-a2a = { workspace = true }
awaken-ext-web-search = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
tracing = { workspace = true }
typedmap = { workspace = true }
uuid = { workspace = true }
genai = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true }
schemars = { workspace = true }
jsonschema = { workspace = true }
parking_lot = { workspace = true }

[features]
default = ["a2a", "handoff", "background"]
a2a = ["dep:reqwest"]
web-search = ["dep:reqwest", "dep:awaken-ext-web-search", "awaken-ext-web-search/serpapi"]
handoff = []
background = []
parallel-tools = []
test-utils = []

[dev-dependencies]
awaken-runtime = { path = ".", features = ["test-utils"] }
awaken-stores = { workspace = true }
tokio = { workspace = true }
proptest = { workspace = true }

[lints]
workspace = true
